commands:
  draw:
    description: 文生图
    usage: 输入提示词即可生成图片
  imgdraw:
    description: 图生图
    usage: 输入提示词后发送图片，可发送多张，输入"完成"或"done"结束收集
  redraw:
    description: 重绘
    usage: 重新生成上一次的图片，无需再次输入提示词
  blacklist:
    description: 黑名单管理（仅管理员）
    usage: |
      blacklist list              查看黑名单
      blacklist add <QQ号> [QQ号...]   加入黑名单
      blacklist remove <QQ号> [QQ号...] 移出黑名单

messages:
  generating: 生成中...
  waitImage: 请在{time}秒内发送需要编辑的图片
  timeout: 等待图片超时，已取消
  empty: 请输入提示词
  noApi: 未配置可用API
  fail: 生成失败
  modelTextOnly: 模型未生成图片，返回文字：{text}
  needAssets: 图生图需要正确配置 assets 服务（selfUrl 未正确设置或服务未启动）
  txt2imgDisabled: 文生图功能未启用
  img2imgDisabled: 图生图功能未启用
  rateLimit: 调用次数已达上限，请稍后再试
  alreadyWaiting: 你已在等待发送图片，请直接发送图片或等待超时
  multiImageReceived: 已收到 {count} 张图片，可继续发送或输入"完成"开始生成
  multiImageLimit: 已达到最大图片数量，自动开始生成
  noImageReceived: 未发送任何图片
  blacklisted: 你已被加入黑名单，无法使用绘图功能
  noPermission: 你没有权限管理黑名单
  blacklistAddSuccess: 已将 {targets} 加入黑名单
  blacklistRemoveSuccess: 已将 {targets} 移出黑名单
  blacklistAddFail:  {targets} 已在黑名单中或无效
  blacklistRemoveFail:  {targets} 不在黑名单中
  invalidUserId:  无效的QQ号：{targets}
  blacklistListEmpty: 当前黑名单为空
  blacklistListTitle: 当前黑名单：
  waitCancel: 已取消等待，可以重新开始
  waitHelp: 发送图片继续，或输入“完成”开始生成，输入“取消”取消
  noLastTask: 没有上一次生成记录，无法重绘
  redrawing: 正在重绘...